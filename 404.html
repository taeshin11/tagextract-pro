<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | TagExtract Pro</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .error-page { text-align: center; padding: 80px 20px; }
    .error-code { font-size: 5rem; font-weight: 800; color: var(--primary); line-height: 1; }
    .error-text { font-size: 1.2rem; color: var(--text-muted); margin: 16px 0 32px; }
    .btn-home {
      display: inline-block; background: var(--primary); color: #fff; text-decoration: none;
      padding: 12px 28px; border-radius: 8px; font-weight: 600; transition: background 0.2s;
    }
    .btn-home:hover { background: var(--primary-dark); }
  </style>
</head>
<body>
  <main class="main">
    <div class="container error-page">
      <div class="error-code">404</div>
      <p class="error-text">Oops! This page doesn't exist.</p>
      <a href="/" class="btn-home">🏷️ Go to TagExtract Pro</a>
    </div>
  </main>
</body>
</html>
